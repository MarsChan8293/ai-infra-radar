app:
  timezone: UTC

storage:
  path: ./data/radar.db

channels:
  webhook:
    enabled: true
    # Placeholder webhook URL. DO NOT commit real webhook URLs. Put your real Feishu webhook URL
    # in a local-only (untracked) YAML config file (e.g., ~/.radar/config.yaml).
    url: https://your-feishu-webhook.example/base/automation/webhook/event/EXAMPLE
  email:
    enabled: false

# Add other sections as needed for your environment
sources:
  github:
    enabled: false
  official_pages:
    enabled: false
    pages: []
  huggingface:
    enabled: false
    organizations: []
